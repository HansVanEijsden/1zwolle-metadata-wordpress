services:
  1zwolle-metadata-wordpress:
    build: .
    container_name: 1zwolle-metadata-wordpress
    environment:
      - SOURCE_URL=https://1zwolle.nl/wp-json/metadata/v1/current
      - FETCH_INTERVAL=60s
      - JITTER=10s
      - PORT=8080
      - LOG_LEVEL=info
    networks:
      metanet:
        ipv4_address: 172.21.0.92
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  metanet:
    external: true
    name: metanet
